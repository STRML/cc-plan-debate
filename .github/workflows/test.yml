name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Run tests
        run: bash tests/run-all.sh
